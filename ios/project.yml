name: Bazar
options:
  bundleIdPrefix: co.polyforms
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "26.2"
  defaultConfig: Debug

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete

targets:
  Bazar:
    type: application
    platform: iOS
    sources:
      - path: Bazar
        excludes:
          - "**/*.graphql"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: co.polyforms.bazar
        INFOPLIST_KEY_CFBundleDisplayName: Bazar
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        GENERATE_INFOPLIST_FILE: true
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: "1.0.0"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
