query ItemDetail($id: ItemId!) {
  item(id: $id) {
    id
    name
    description
    category
    quantity
    photoImageId
    addedBy
    personalNotes
    purchaseDate
    purchaseLocation
    invoiceImageId
    createdAt
    updatedAt
    location {
      fullPath
      placeId
      placeName
      roomId
      roomName
      zoneId
      zoneName
      storageId
      storageName
    }
    reminders {
      id
      title
      notes
      dueDate
      frequency
      customIntervalDays
      createdAt
      updatedAt
    }
  }
}
