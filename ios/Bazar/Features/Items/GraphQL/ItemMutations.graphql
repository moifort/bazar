mutation AddItem($input: AddItemInput!) {
  addItem(input: $input) {
    id
    name
    category
    quantity
    createdAt
  }
}

mutation UpdateItem($id: ItemId!, $input: UpdateItemInput!) {
  updateItem(id: $id, input: $input) {
    id
    name
    category
    quantity
    purchaseDate
    purchaseLocation
    invoiceImageId
    updatedAt
  }
}

mutation DeleteItem($id: ItemId!) {
  deleteItem(id: $id)
}

mutation MoveItem($id: ItemId!, $storageId: StorageId!) {
  moveItem(id: $id, storageId: $storageId) {
    id
    name
    location {
      fullPath
    }
  }
}

mutation ConfirmItems($input: [ConfirmItemInput!]!) {
  confirmItems(input: $input) {
    id
    name
    category
    quantity
    createdAt
  }
}

query DistinctPurchaseLocations {
  distinctPurchaseLocations
}
